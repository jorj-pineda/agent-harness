# Eval scenarios — scripted support conversations driven through run_turn.
#
# Each scenario is a single user turn with a fully-scripted provider. The
# runner:
#   1. Seeds a per-scenario tmp FactStore with `seed_facts` (if any).
#   2. Builds a ToolRegistry with:
#        - a scripted `search_docs` tool whose results come from
#          `tool_results.search_docs` (one list per invocation, in order);
#        - the real memory tools bound to the tmp FactStore.
#   3. Feeds `responses` to a FakeProvider in order.
#   4. Invokes harness.loop.run_turn and scores the TurnResponse.
#
# Schema (YAML → dicts):
#   id:            str, unique
#   category:      one of grounded_qa | personalization | off_topic |
#                         low_confidence | prompt_injection
#   user_id:       str (defaults to "eval_user")
#   user_input:    str (the turn's user message)
#   seed_facts:    list[str], facts pre-added to FactStore before the turn
#   tool_results:
#     search_docs: list[list[dict]]  (one list per expected search_docs call)
#   responses:     list[dict], each either
#                    {content: str}                       for a final answer, or
#                    {tool_calls: [{name, arguments}]}    for a tool-use step.
#                    The runner synthesises ids (t1, t2, …) so scenarios don't.
#   expected:
#     gold_chunks:    list[str], chunk ids that should appear in citations
#     gold_answer:    str, used for token-F1 correctness
#     expected_facts: list[str], substrings to look for in answer+memory_writes
#     should_escalate: bool, gold escalation decision
#
# We cover five categories with six scenarios each (30 total), per Step 11.

# ─── 1. Grounded factual Q&A ────────────────────────────────────────────────
- id: grounded_return_window
  category: grounded_qa
  user_id: grounded_u1
  user_input: "How long do I have to return a product?"
  tool_results:
    search_docs:
      - - chunk_id: "returns#window"
          score: 0.92
          text: "Returns are accepted within 30 days of delivery."
          doc_id: "returns-policy"
          title: "Returns Policy"
          section: "Window"
          category: "returns"
          source_path: "returns.md"
        - chunk_id: "returns#refunds"
          score: 0.81
          text: "Refunds post to the original payment method within 5 business days."
          doc_id: "returns-policy"
          title: "Returns Policy"
          section: "Refunds"
          category: "returns"
          source_path: "returns.md"
  responses:
    - tool_calls:
        - name: search_docs
          arguments: { query: "return window" }
    - content: "You can return items within 30 days of delivery."
  expected:
    gold_chunks: ["returns#window"]
    gold_answer: "Items can be returned within 30 days of delivery."
    expected_facts: []
    should_escalate: false

